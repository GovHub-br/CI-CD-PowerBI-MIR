name: Deploy PBIP to OneDrive (corporativo)

on:
  push:
    branches:
      - main
    paths:
      - 'Dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Reescrever conexoes CSV -> SharePoint
        env:
          SHAREPOINT_SITE_URL: ${{ vars.SHAREPOINT_SITE_URL }}
          SHAREPOINT_FOLDER: ${{ vars.SHAREPOINT_FOLDER }}
          CONNECTION_MODE: ${{ vars.CONNECTION_MODE || 'sharepoint' }}
        run: python .github/scripts/update_connections_sharepoint.py

      - name: Upload PBIP para OneDrive corporativo
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          ONEDRIVE_USER_ID: ${{ secrets.ONEDRIVE_USER_ID }}
          ONEDRIVE_FOLDER_PATH: ${{ vars.ONEDRIVE_FOLDER_PATH || 'PBIP_Deploy' }}
        run: python .github/scripts/upload_corporate.py
